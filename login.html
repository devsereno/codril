<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulmão AE - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full">

    <div class="text-center mb-10">
      <span class="text-6xl">📦</span>
      <h1 class="text-4xl font-bold mt-4">PULMÃO AE</h1>
      <p class="text-slate-400">Sistema de Armazenamento Inteligente</p>
    </div>

    <div class="bg-slate-900 rounded-3xl p-8 border border-slate-700">
      <h2 class="text-xl font-semibold mb-6 text-center">Login</h2>
      
      <input id="email" type="email" value="ricardomaster@gmail.com" 
             class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-4">
      <input id="senha" type="password" value="8486" 
             class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-6">

      <button onclick="fazerLogin()" 
              class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-semibold text-lg">
        Entrar
      </button>
    </div>

    <p id="mensagem" class="text-center mt-6 text-red-400"></p>
  </div>

  <script>
    async function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value.trim();
      const msg = document.getElementById('mensagem');

      msg.textContent = "Conectando ao servidor...";

      try {
        const res = await fetch('https://codril.onrender.com/api/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const data = await res.json();

        if (data.success) {
          msg.style.color = "lime";
          msg.textContent = `✅ Bem-vindo, ${data.user.nome}!`;
          localStorage.setItem('currentUser', JSON.stringify(data.user));
          setTimeout(() => window.location.href = 'index.html', 1500);
        } else {
          msg.textContent = data.message || "Login inválido";
        }
      } catch (e) {
        console.error(e);
        msg.textContent = "❌ Erro de conexão com o servidor";
      }
    }
  </script>
</body>
</html>
