  <meta charset="UTF-8">

<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold">📦 PULMÃO AE</h1>
      <p class="text-slate-400 mt-2">Sistema de Armazenamento</p>
    </div>

    <div class="bg-slate-900 rounded-3xl p-8 border border-slate-700">
      <div id="loginForm">
        <input id="email" type="email" placeholder="E-mail" 
               class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-4">
        <input id="senha" type="password" placeholder="Senha" 
               class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-6">
        <button onclick="fazerLogin()" 
                class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-semibold text-lg">
          Entrar
        </button>
      </div>

      <p id="mensagem" class="text-center mt-6 text-red-400"></p>
    </div>
  </div>

  <script type="module">
    async function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value.trim();
      const msg = document.getElementById('mensagem');

      msg.textContent = "Tentando login...";

      if (!email || !senha) {
        msg.textContent = "Preencha email e senha";
        return;
      }

      try {
        const response = await fetch('https://codril.xo.je/api/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const data = await response.json();
        console.log("Resposta da API:", data);

        if (data.success) {
          msg.style.color = "green";
          msg.textContent = "Login realizado! Bem-vindo.";
          localStorage.setItem('currentUser', JSON.stringify(data.user));
          setTimeout(() => window.location.href = 'index.html', 1500);
        } else {
          msg.textContent = data.message || "Erro ao fazer login";
        }
      } catch (error) {
        console.error("Erro:", error);
        msg.textContent = "Erro de conexão com o servidor";
      }
    }

    // Permite pressionar Enter
    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') fazerLogin();
    });
  </script>
</body>
