<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulmão AE - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full">

    <div class="text-center mb-10">
      <span class="text-6xl">📦</span>
      <h1 class="text-4xl font-bold mt-4">PULMÃO AE</h1>
      <p class="text-slate-400">Sistema de Armazenamento Inteligente</p>
    </div>

    <!-- Tela de Primeiro Cadastro -->
    <div class="bg-slate-900 rounded-3xl p-8 border border-slate-700">
      <h2 class="text-2xl font-semibold text-center mb-6 text-emerald-400">Primeira Configuração</h2>
      
      <input id="masterNome" placeholder="Seu nome" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-3">
      <input id="masterEmail" type="email" placeholder="E-mail" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-3" value="ricardogoncalves21@gmail.com">
      <input id="masterSenha" type="password" placeholder="Senha" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-6" value="8486">

      <button onclick="criarMaster()" 
              class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-semibold text-lg">
        Criar Usuário Master
      </button>
    </div>

    <p id="mensagem" class="text-center mt-6 text-red-400"></p>
  </div>

  <script>
    function criarMaster() {
      const nome = document.getElementById('masterNome').value.trim();
      const email = document.getElementById('masterEmail').value.trim();
      const senha = document.getElementById('masterSenha').value.trim();

      if (!nome || !email || !senha) {
        alert("Preencha todos os campos!");
        return;
      }

      alert(`✅ Usuário Master criado com sucesso!\n\nEmail: ${email}\nSenha: ${senha}\n\nAgora faça login com esses dados.`);
      
      // Redireciona para a tela de login
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
