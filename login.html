<!DOCTYPE html>
<html lang="pt" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulmão AE - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full">

    <div class="text-center mb-10">
      <div class="flex justify-center mb-4">
        <span class="text-6xl">📦</span>
      </div>
      <h1 class="text-4xl font-bold">PULMÃO AE</h1>
      <p class="text-slate-400 mt-1">Sistema de Armazenamento Inteligente</p>
    </div>

    <!-- Primeiro Acesso -->
    <div id="firstRunScreen" class="bg-slate-900 rounded-3xl p-8 border border-slate-700">
      <h2 class="text-2xl font-semibold text-center mb-6 text-emerald-400">Primeira Configuração</h2>
      <input id="masterNome" placeholder="Seu nome completo" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-3">
      <input id="masterEmail" type="email" placeholder="E-mail Master" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-3">
      <input id="masterSenha" type="password" placeholder="Senha forte" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-6">
      <button onclick="criarMaster()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-semibold">Criar Usuário Master</button>
    </div>

    <!-- Tela de Login Normal -->
    <div id="loginScreen" class="hidden bg-slate-900 rounded-3xl p-8 border border-slate-700">
      <input id="email" type="email" placeholder="E-mail" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-3">
      <input id="senha" type="password" placeholder="Senha" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-6">
      <button onclick="fazerLogin()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-semibold text-lg">Entrar</button>
    </div>

    <p id="mensagem" class="text-center mt-6 text-red-400 min-h-[28px]"></p>

  </div>

  <script type="module">
    // Importar funções (se você já tem os arquivos js)
    async function init() {
      // Por enquanto vamos sempre mostrar a tela de Master para testar
      document.getElementById('firstRunScreen').classList.remove('hidden');
    }

    window.criarMaster = async () => {
      const nome = document.getElementById('masterNome').value;
      const email = document.getElementById('masterEmail').value;
      const senha = document.getElementById('masterSenha').value;
      const msg = document.getElementById('mensagem');

      if (!nome || !email || !senha) {
        msg.textContent = "Preencha todos os campos";
        return;
      }

      msg.textContent = "Criando usuário...";
      
      // Aqui você pode implementar a criação via API depois
      alert(`✅ Usuário Master criado!\nEmail: ${email}\nSenha: ${senha}`);
      document.getElementById('firstRunScreen').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
    };

    window.fazerLogin = async () => {
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const msg = document.getElementById('mensagem');

      msg.textContent = "Entrando...";

      try {
        const res = await fetch('https://codril.xo.je/api/login.php', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email, senha})
        });
        const data = await res.json();

        if (data.success) {
          msg.style.color = 'lime';
          msg.textContent = 'Login realizado!';
          setTimeout(() => window.location.href = 'index.html', 1000);
        } else {
          msg.textContent = data.message || 'Erro no login';
        }
      } catch(e) {
        msg.textContent = 'Erro de conexão com servidor';
      }
    };

    init();
  </script>
</body>
</html>
