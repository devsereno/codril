<!DOCTYPE html>
<html lang="pt-PT" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <title>Nova Divergência</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    function aplicarTema() {
      const isDark = localStorage.getItem('modoEscuro') === 'true';
      document.getElementById('htmlRoot').className = isDark ? 'dark' : '';
    }
    function alternarTema() {
      localStorage.setItem('modoEscuro', localStorage.getItem('modoEscuro') !== 'true');
      aplicarTema();
    }
  </script>
  <style>
    .dark body { background-color: #020617; color: white; }
    .dark .bg-form { background-color: #0f172a; border-color: #1e293b; }
    .light body { background-color: #f8fafc; color: #0f172a; }
    .light .bg-form { background-color: #ffffff; border-color: #e2e8f0; }
  </style>
</head>
<body class="min-h-screen p-4 flex items-center justify-center transition-colors duration-300">

  <div class="w-full max-w-md bg-form border p-8 rounded-3xl shadow-xl">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-2xl font-black text-blue-500">Nova Divergência</h1>
      <button onclick="alternarTema()" class="bg-slate-500/20 px-3 py-2 rounded-xl text-xs font-bold">🌓</button>
    </div>

    <form id="formCadastro" class="space-y-4">
      <!-- Campos como antes, labels com texto mais legível -->
      <div>
        <label class="text-[11px] uppercase font-bold opacity-80">Endereço</label>
        <input type="text" name="endereco" required class="w-full bg-transparent border border-slate-300 dark:border-slate-700 rounded-xl p-3 text-sm mt-1">
      </div>
      
      <button type="button" onclick="document.getElementById('divObs').classList.toggle('hidden')" class="text-blue-500 text-[10px] font-bold underline">+ Adicionar observação</button>
      <div id="divObs" class="hidden">
        <textarea name="observacao" class="w-full bg-transparent border border-slate-300 dark:border-slate-700 rounded-xl p-3 text-sm"></textarea>
      </div>

      <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl">Registar</button>
      <a href="lista.html" class="block text-center border border-slate-300 dark:border-slate-700 py-3 rounded-2xl text-xs font-bold">Gestão de Divergências</a>
    </form>
  </div>

  <script>aplicarTema();</script>
</body>
</html>
