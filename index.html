<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Divergência</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 flex items-center justify-center font-sans">

  <div class="w-full max-w-md bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-2xl">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-black text-blue-400">Nova Divergência</h1>
      <p class="text-slate-500 text-xs mt-1">Registe um novo erro operacional</p>
    </div>

    <form id="formCadastro" class="space-y-5">
      <div>
        <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Tipo de Armazenagem</label>
        <select name="tipo_armazenagem" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm mt-1 outline-none focus:border-blue-500">
          <option>Pulmão AE</option>
          <option>Picking</option>
          <option>Outros</option>
        </select>
      </div>

      <div>
        <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Endereço</label>
        <input type="text" name="endereco" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm mt-1 outline-none focus:border-blue-500">
      </div>

      <div>
        <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Código do Produto / SKU</label>
        <input type="text" name="codigo_produto" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm mt-1 outline-none focus:border-blue-500">
      </div>

      <div>
        <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Lote</label>
        <input type="text" name="lote" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm mt-1 outline-none focus:border-blue-500">
      </div>

      <div>
        <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Status</label>
        <select name="status_estoque" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm mt-1 outline-none focus:border-blue-500">
          <option value="Faltando">Faltando</option>
          <option value="Normal">Normal</option>
        </select>
      </div>

      <div>
        <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Quantidade</label>
        <input type="number" name="quantidade" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm mt-1 outline-none focus:border-blue-500">
      </div>

      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all mt-4">
        Registar Divergência
      </button>
      
      <a href="lista.html" class="block text-center text-slate-500 text-xs hover:text-white underline mt-4">Ver lista de divergências</a>
    </form>
  </div>

  <script>
    document.getElementById('formCadastro').onsubmit = async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const user = JSON.parse(sessionStorage.getItem('usuarioLogado'));
      
      // Lógica de envio para sua API
      // ... (manter o fetch que você já utiliza)
      alert("Divergência registada com sucesso!");
      window.location.href = 'lista.html';
    };
  </script>
</body>
</html>
