<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulmão AE - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen relative">

  <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-50 transform transition-all duration-300 opacity-0 pointer-events-none scale-90">
    <div id="toastBg" class="flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl border backdrop-blur-sm">
      <span id="toastIcon" class="text-xl"></span>
      <span id="toastMessage" class="font-medium text-sm"></span>
    </div>
  </div>

  <div class="max-w-4xl mx-auto p-4">

    <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
      <div class="flex items-center gap-3">
        <span class="text-5xl">📦</span>
        <div>
          <h1 class="text-3xl font-bold">PULMÃO AE</h1>
          <p id="userName" class="text-slate-400">Carregando usuário...</p>
        </div>
      </div>
      
      <div class="flex items-center gap-3">
        <button onclick="logout()" class="px-6 py-2 bg-red-500/20 text-red-400 rounded-2xl hover:bg-red-500/30 transition-colors">
          Sair
        </button>
      </div>
    </div>

    <div id="admLink" class="hidden mb-6">
      <a href="adm.html" class="flex items-center justify-center gap-3 bg-amber-600 hover:bg-amber-500 py-4 rounded-3xl font-semibold transition-all shadow-lg shadow-amber-600/10">
        ⚙️ Painel Administrativo
      </a>
    </div>

    <div class="bg-slate-900 rounded-3xl p-6 mb-8 border border-slate-700 shadow-xl">
      <h2 class="text-xl font-semibold mb-5 flex items-center gap-2">
        <span>📝</span> Novo Cadastro
      </h2>
      
      <div class="grid grid-cols-1 gap-4">
        <label class="block">
          <span class="text-xs text-slate-400 font-medium mb-1 block">Tipo de Armazenagem</span>
          <select id="tipo" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500 text-white">
            <option value="pulmao">Pulmão AE</option>
            <option value="picking">Picking</option>
          </select>
        </label>

        <label class="block">
          <span class="text-xs text-slate-400 font-medium mb-1 block">Endereço (Apenas números)</span>
          <input id="endereco" placeholder="Ex: 101" type="text" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
        </label>

        <label class="block">
          <span class="text-xs text-slate-400 font-medium mb-1 block">Código do Produto (Apenas números)</span>
          <input id="codigo" placeholder="Digite o SKU" type="text" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
        </label>

        <label class="block">
          <span class="text-xs text-slate-400 font-medium mb-1 block">Lote</span>
          <input id="lote" placeholder="Digite o lote" maxlength="20" type="text" oninput="this.value = this.value.toUpperCase()" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 uppercase focus:outline-none focus:border-blue-500">
        </label>

        <label class="block">
          <span class="text-xs text-slate-400 font-medium mb-1 block">Descrição (Opcional)</span>
          <input id="descricao" placeholder="Observações do produto..." type="text" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
        </label>
      </div>

      <button id="btnSalvar" onclick="cadastrarProduto()" class="mt-6 w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-semibold transition-all active:scale-[0.99] flex justify-center items-center gap-2 shadow-lg shadow-blue-600/20">
        <span>💾 Salvar no Sistema</span>
      </button>
    </div>

    <div class="flex gap-4">
      <a href="lista.html" class="flex-1 bg-slate-800 hover:bg-slate-700 border border-slate-700 py-5 rounded-2xl text-center font-semibold transition-colors flex justify-center items-center gap-2">
        <span>📋</span> Ver Todos os Itens
      </a>
    </div>

  </div>

  <script>
    function mostrarAviso(mensagem, tipo = 'sucesso') {
      const toast = document.getElementById('toast');
      const toastBg = document.getElementById('toastBg');
      const toastIcon = document.getElementById('toastIcon');
      const toastMessage = document.getElementById('toastMessage');

      if (tipo === 'sucesso') {
        toastBg.className = "flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl border bg-emerald-500/90 border-emerald-400 text-white backdrop-blur-sm";
        toastIcon.textContent = "✅";
      } else if (tipo === 'erro') {
        toastBg.className = "flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl border bg-red-500/90 border-red-400 text-white backdrop-blur-sm";
        toastIcon.textContent = "❌";
      } else {
        toastBg.className = "flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl border bg-amber-500/90 border-amber-400 text-white backdrop-blur-sm";
        toastIcon.textContent = "⚠️";
      }

      toastMessage.textContent = mensagem;
      toast.classList.remove('opacity-0', 'pointer-events-none', 'scale-90', 'top-5');
      toast.classList.add('opacity-100', 'scale-100', 'top-8');

      setTimeout(() => {
        toast.classList.remove('opacity-100', 'scale-100', 'top-8');
        toast.classList.add('opacity-0', 'pointer-events-none', 'scale-90', 'top-5');
      }, 3000);
    }

    async function cadastrarProduto() {
      const btn = document.getElementById('btnSalvar');
      
      const dados = {
        tipo: document.getElementById('tipo').value,
        endereco: document.getElementById('endereco').value.trim(),
        codigo_produto: document.getElementById('codigo').value.trim(),
        lote: document.getElementById('lote').value.trim().toUpperCase(),
        descricao: document.getElementById('descricao').value.trim()
      };

      if (!dados.endereco || !dados.codigo_produto || !dados.lote) {
        mostrarAviso("Preencha os campos obrigatórios: Endereço, Código e Lote.", "alerta");
        return;
      }

      try {
        btn.disabled = true;
        btn.innerHTML = `<span>⏳ Gravando dados...</span>`;
        btn.classList.replace('bg-blue-600', 'bg-slate-700');

        const res = await fetch('https://codril.onrender.com/api/salvar-produto.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        });

        if (!res.ok) throw new Error(`Erro no servidor: ${res.status}`);
        const data = await res.json();
        
        if (data.success) {
          mostrarAviso("Salvo com sucesso!", "sucesso");
          limparFormulario();
        } else {
          mostrarAviso(data.message || "Erro ao salvar o produto.", "erro");
        }
      } catch (e) {
        console.error(e);
        mostrarAviso("Erro de conexão com o servidor.", "erro");
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<span>💾 Salvar no Sistema</span>`;
        btn.classList.replace('bg-slate-700', 'bg-blue-600');
      }
    }

    function limparFormulario() {
      document.getElementById('endereco').value = '';
      document.getElementById('codigo').value = '';
      document.getElementById('lote').value = '';
      document.getElementById('descricao').value = '';
    }

    function logout() {
      localStorage.clear();
      location.href = 'login.html';
    }

    window.onload = function() {
      try {
        const userRaw = localStorage.getItem('currentUser');
        const admContainer = document.getElementById('admLink');
        
        if (!userRaw) {
          location.href = 'login.html';
          return;
        }

        const user = JSON.parse(userRaw);
        document.getElementById('userName').textContent = `Olá, ${user.nome || 'Operador'}`;

        const nivel = (user.nivel || '').toLowerCase().trim();
        const nome = (user.nome || '').toLowerCase();
        
        // Exibe o botão se for admin ou se tiver "master" no nome
        if (nivel === 'super' || nivel === 'master' || nome.includes('master')) {
          if (admContainer) admContainer.classList.remove('hidden');
        } else {
          if (admContainer) admContainer.classList.add('hidden');
        }

      } catch (err) {
        console.error(err);
        localStorage.clear();
        location.href = 'login.html';
      }
    };
  </script>
</body>
</html>
