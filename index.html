<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Registro - Pulmão AE</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4 font-sans">

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-50 transform transition-all duration-300 opacity-0 pointer-events-none scale-90">
    <div id="toastBg" class="flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl border backdrop-blur-sm">
      <span id="toastIcon" class="text-xl"></span>
      <span id="toastMessage" class="font-medium text-sm"></span>
    </div>
  </div>

  <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 max-w-md w-full shadow-2xl">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-extrabold text-blue-400">📝 Novo Cadastro</h1>
      <p class="text-xs text-slate-400 mt-1">Preencha os detalhes da posição de estoque</p>
    </div>

    <form id="formCadastro" class="space-y-4">
      
      <!-- Tipo -->
      <div>
        <label class="block text-slate-400 text-xs font-bold mb-2">Tipo de Armazenagem</label>
        <select id="tipoArmazenagem" class="w-full bg-slate-950 border border-slate-850 rounded-2xl px-5 py-4 text-white text-sm focus:outline-none focus:border-blue-500">
          <option value="Pulmao">Pulmão AE</option>
          <option value="Picking">Picking</option>
        </select>
      </div>

      <!-- Endereço -->
      <div>
        <label class="block text-slate-400 text-xs font-bold mb-2">Endereço (Apenas números)</label>
        <input type="number" id="endereco" required placeholder="Ex: 101" class="w-full bg-slate-950 border border-slate-850 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-blue-500">
      </div>

      <!-- SKU -->
      <div>
        <label class="block text-slate-400 text-xs font-bold mb-2">Código do Produto / SKU</label>
        <input type="number" id="sku" required placeholder="Digite o SKU" class="w-full bg-slate-950 border border-slate-850 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-blue-500">
      </div>

      <!-- Lote -->
      <div>
        <label class="block text-slate-400 text-xs font-bold mb-2">Lote</label>
        <input type="text" id="lote" required placeholder="DIGITE O LOTE" class="w-full bg-slate-950 border border-slate-850 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-blue-500 uppercase">
      </div>

      <!-- Status da Posição (NOVO) -->
      <div>
        <label class="block text-slate-400 text-xs font-bold mb-2">Status da Posição</label>
        <select id="statusEstoque" class="w-full bg-slate-950 border border-slate-850 rounded-2xl px-5 py-4 text-white text-sm focus:outline-none focus:border-blue-500">
          <option value="Normal">Normal</option>
          <option value="Faltando">Faltando</option>
          <option value="Sobrando">Sobrando</option>
        </select>
      </div>

      <!-- Quantidade -->
      <div>
        <label class="block text-slate-400 text-xs font-bold mb-2">Quantidade de Unidades</label>
        <input type="number" id="quantidade" value="1" required class="w-full bg-slate-950 border border-slate-850 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-blue-500">
      </div>

      <!-- Descrição -->
      <div>
        <label class="block text-slate-400 text-xs font-bold mb-2">Observações (Opcional)</label>
        <textarea id="descricao" placeholder="Observações do produto..." class="w-full bg-slate-950 border border-slate-850 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-blue-500 h-24"></textarea>
      </div>

      <button type="submit" id="btnSalvar" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl text-xs font-bold transition-all active:scale-95 shadow-lg shadow-blue-600/20">
        💾 Salvar no Sistema
      </button>
    </form>

    <div class="mt-6 text-center">
      <a href="lista.html" class="text-xs text-slate-500 hover:text-blue-400 font-bold transition-all">Ver Estoque Ativo →</a>
    </div>
  </div>

  <script>
    const API_URL = 'https://codril.onrender.com/api/salvar-produto.php';

    document.getElementById('formCadastro').onsubmit = async function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('btnSalvar');
      btn.disabled = true;
      btn.textContent = "Salvando...";

      const user = JSON.parse(sessionStorage.getItem('usuarioLogado'));
      
      const dados = {
        token: user ? user.token : '',
        tipo: document.getElementById('tipoArmazenagem').value,
        endereco: document.getElementById('endereco').value,
        codigo_produto: document.getElementById('sku').value,
        lote: document.getElementById('lote').value,
        status_estoque: document.getElementById('statusEstoque').value, // Envio do novo campo
        quantidade: document.getElementById('quantidade').value,
        descricao: document.getElementById('descricao').value
      };

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        });

        const result = await res.json();
        
        if (result.success) {
          mostrarAviso("Registro salvo com sucesso!", "sucesso");
          document.getElementById('formCadastro').reset();
        } else {
          mostrarAviso(result.message || "Erro ao salvar.", "erro");
        }
      } catch (err) {
        mostrarAviso("Erro de conexão.", "erro");
      } finally {
        btn.disabled = false;
        btn.textContent = "💾 Salvar no Sistema";
      }
    };

    function mostrarAviso(mensagem, tipo) {
      const toast = document.getElementById('toast');
      const toastBg = document.getElementById('toastBg');
      const toastMessage = document.getElementById('toastMessage');
      
      toastBg.className = `flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl border backdrop-blur-sm ${tipo === 'sucesso' ? 'bg-emerald-500/90 border-emerald-400' : 'bg-red-500/90 border-red-400'}`;
      toastMessage.textContent = mensagem;
      toast.classList.remove('opacity-0', 'pointer-events-none');
      
      setTimeout(() => {
        toast.classList.add('opacity-0', 'pointer-events-none');
      }, 3000);
    }
  </script>
</body>
</html>
