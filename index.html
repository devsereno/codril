<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Registro - Pulmão AE</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 font-sans">

  <!-- Exibição de quem está logado -->
  <div class="max-w-md mx-auto mb-4 text-slate-500 text-xs text-right">
    Olá, <span id="userName" class="font-bold text-blue-400">...</span>
  </div>

  <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 max-w-md w-full mx-auto shadow-2xl">
    <div class="text-center mb-8">
      <h1 class="text-xl font-extrabold text-blue-400">📝 Novo Cadastro</h1>
    </div>

    <form id="formCadastro" class="space-y-4">
      <!-- Tipo -->
      <div>
        <label class="block text-slate-400 text-xs font-bold mb-2">Tipo de Armazenagem</label>
        <select id="tipoArmazenagem" class="w-full bg-slate-950 border border-slate-850 rounded-2xl px-5 py-4 text-white text-sm outline-none focus:border-blue-500">
          <option value="Pulmao">Pulmão AE</option>
          <option value="Picking">Picking</option>
        </select>
      </div>

      <!-- Campos principais... -->
      <div>
        <label class="block text-slate-400 text-xs font-bold mb-2">Endereço</label>
        <input type="number" id="endereco" required class="w-full bg-slate-950 border border-slate-850 rounded-2xl px-5 py-4 text-sm outline-none focus:border-blue-500">
      </div>

      <!-- Status (Apenas faltando ou sobrando) -->
      <div>
        <label class="block text-slate-400 text-xs font-bold mb-2">Status da Posição</label>
        <select id="statusEstoque" class="w-full bg-slate-950 border border-slate-850 rounded-2xl px-5 py-4 text-white text-sm outline-none focus:border-blue-500">
          <option value="Faltando">Faltando</option>
          <option value="Sobrando">Sobrando</option>
        </select>
      </div>

      <!-- Botão para alternar observação -->
      <button type="button" onclick="toggleObs()" class="text-blue-500 text-[10px] font-bold underline">
        + Adicionar Observação
      </button>

      <!-- Campo de observação oculto -->
      <div id="divObs" class="hidden">
        <textarea id="descricao" placeholder="Escreva a observação..." class="w-full bg-slate-950 border border-slate-850 rounded-2xl px-5 py-4 text-sm outline-none h-20"></textarea>
      </div>

      <button type="submit" class="w-full bg-blue-600 py-4 rounded-2xl text-xs font-bold mt-4">Salvar Registro</button>
    </form>
  </div>

  <script>
    // Carrega nome do usuário
    const user = JSON.parse(sessionStorage.getItem('usuarioLogado') || '{}');
    document.getElementById('userName').textContent = user.nome || 'Visitante';

    // Toggle observação
    function toggleObs() {
      document.getElementById('divObs').classList.toggle('hidden');
    }
    
    // ... restante da lógica de salvar igual à anterior
  </script>
</body>
</html>
