<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulmão AE - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div class="max-w-4xl mx-auto p-4">

    <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
      <div class="flex items-center gap-3">
        <span class="text-5xl">📦</span>
        <div>
          <h1 class="text-3xl font-bold">PULMÃO AE</h1>
          <p id="userName" class="text-slate-400">Carregando...</p>
        </div>
      </div>
      <button onclick="logout()" class="px-6 py-2 bg-red-500/20 text-red-400 rounded-2xl hover:bg-red-500/30">
        Sair
      </button>
    </div>

    <!-- Formulário -->
    <div class="bg-slate-900 rounded-3xl p-6 mb-8 border border-slate-700">
      <h2 class="text-xl font-semibold mb-5">Novo Cadastro</h2>
      <div class="grid grid-cols-1 gap-4">
        <select id="tipo" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4">
          <option value="pulmao">Pulmão AE</option>
          <option value="picking">Picking</option>
        </select>
        <input id="endereco" placeholder="Endereço (ex: 101)" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4">
        <input id="codigo" placeholder="Código do Produto" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4">
        <input id="lote" placeholder="Lote" maxlength="20" oninput="this.value = this.value.toUpperCase()" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 uppercase">
        <input id="descricao" placeholder="Descrição" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4">
      </div>

      <button onclick="cadastrarProduto()" class="mt-6 w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-semibold">
        💾 Salvar no Sistema
      </button>
    </div>

    <!-- Lista -->
    <div class="bg-slate-900 rounded-3xl p-6 border border-slate-700">
      <h2 class="text-xl font-semibold mb-5">Itens Cadastrados</h2>
      <div id="listaItens" class="space-y-3"></div>
    </div>
  </div>

  <script>
    async function cadastrarProduto() {
      const dados = {
        tipo: document.getElementById('tipo').value,
        endereco: document.getElementById('endereco').value.trim(),
        codigo_produto: document.getElementById('codigo').value.trim(),
        lote: document.getElementById('lote').value.trim().toUpperCase(),
        descricao: document.getElementById('descricao').value.trim()
      };

      if (!dados.endereco || !dados.codigo_produto || !dados.lote) {
        alert("Preencha Endereço, Código e Lote");
        return;
      }

      try {
        const res = await fetch('https://codril.onrender.com/api/salvar-produto.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        });

        const data = await res.json();

        if (data.success) {
          alert("✅ Salvo com sucesso!");
          limparFormulario();
          carregarLista();   // Atualiza a lista imediatamente
        } else {
          alert(data.message || "Erro ao salvar");
        }
      } catch (e) {
        alert("❌ Erro de conexão");
      }
    }

    function limparFormulario() {
      document.getElementById('endereco').value = '';
      document.getElementById('codigo').value = '';
      document.getElementById('lote').value = '';
      document.getElementById('descricao').value = '';
    }

    async function carregarLista() {
      const container = document.getElementById('listaItens');
      container.innerHTML = '<p class="text-slate-500 text-center py-10">Carregando...</p>';

      try {
        const res = await fetch('https://codril.onrender.com/api/salvar-produto.php');
        const data = await res.json();

        if (data.itens && data.itens.length > 0) {
          let html = '';
          data.itens.forEach(item => {
            html += `
              <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700">
                <div class="flex justify-between">
                  <span class="text-blue-400">${item.tipo.toUpperCase()}</span>
                  <span class="text-xs text-slate-500">${item.data_cadastro ? item.data_cadastro.substring(0,10) : ''}</span>
                </div>
                <p class="text-2xl font-mono mt-2">${item.endereco}</p>
                <p class="text-lg">${item.codigo_produto} • ${item.lote}</p>
                \( {item.descricao ? `<p class="text-slate-400 text-sm mt-1"> \){item.descricao}</p>` : ''}
              </div>`;
          });
          container.innerHTML = html;
        } else {
          container.innerHTML = '<p class="text-slate-500 text-center py-10">Nenhum item cadastrado ainda.</p>';
        }
      } catch (e) {
        container.innerHTML = '<p class="text-red-400 text-center py-10">Erro ao carregar lista</p>';
      }
    }

    function logout() {
      localStorage.clear();
      location.href = 'login.html';
    }

    window.onload = function() {
      const user = JSON.parse(localStorage.getItem('currentUser'));
      if (!user) return location.href = 'login.html';
      document.getElementById('userName').textContent = `Olá, ${user.nome}`;
      carregarLista();
    };
  </script>
</body>
</html>
