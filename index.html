<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulmão AE - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 dark:bg-slate-950 text-white min-h-screen transition-all">
  <div class="max-w-4xl mx-auto p-4">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
      <div class="flex items-center gap-3">
        <span class="text-4xl">📦</span>
        <div>
          <h1 class="text-3xl font-bold tracking-tight">PULMÃO AE</h1>
          <p id="userName" class="text-slate-400 text-sm">Carregando...</p>
        </div>
      </div>
      <div class="flex gap-2">
        <button onclick="toggleTheme()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-2xl text-xl">
          🌓
        </button>
        <button onclick="logout()" class="px-6 py-2 bg-red-500/20 text-red-400 rounded-2xl hover:bg-red-500/30">
          Sair
        </button>
      </div>
    </div>

    <!-- Formulário -->
    <div class="bg-slate-900 dark:bg-slate-900 rounded-3xl p-6 mb-8 border border-slate-700">
      <h2 class="text-xl font-semibold mb-5">Novo Cadastro</h2>
      <div class="grid grid-cols-1 gap-4">
        <select id="tipo" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4">
          <option value="pulmao">Pulmão AE</option>
          <option value="picking">Picking</option>
        </select>
        <input id="endereco" placeholder="Endereço (ex: 101-2)" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4">
        <input id="codigo" placeholder="Código do Produto" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4">
        <input id="lote" placeholder="Lote" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4">
        <input id="descricao" placeholder="Descrição" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4">
      </div>

      <button onclick="cadastrarProduto()" class="mt-6 w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-semibold text-lg">
        💾 Salvar no Sistema
      </button>
    </div>

    <!-- Lista -->
    <div class="bg-slate-900 dark:bg-slate-900 rounded-3xl p-6 border border-slate-700">
      <h2 class="text-xl font-semibold mb-5">Itens Cadastrados</h2>
      <div id="listaItens" class="space-y-3"></div>
    </div>
  </div>

  <script>
    // Alternar tema
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
    }

    async function cadastrarProduto() {
      const dados = {
        tipo: document.getElementById('tipo').value,
        endereco: document.getElementById('endereco').value.trim(),
        codigo_produto: document.getElementById('codigo').value.trim(),
        lote: document.getElementById('lote').value.trim(),
        descricao: document.getElementById('descricao').value.trim()
      };

      if (!dados.endereco || !dados.codigo_produto || !dados.lote) {
        alert("Preencha os campos obrigatórios");
        return;
      }

      try {
        const res = await fetch('https://codril.onrender.com/api/salvar-produto.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        });

        const data = await res.json();

        if (data.success) {
          alert("✅ Salvo com sucesso!");
          limparFormulario();
          carregarLista();
        } else {
          alert(data.message || "Erro ao salvar");
        }
      } catch (e) {
        alert("❌ Erro de conexão");
      }
    }

    function limparFormulario() {
      document.getElementById('endereco').value = '';
      document.getElementById('codigo').value = '';
      document.getElementById('lote').value = '';
      document.getElementById('descricao').value = '';
    }

    async function carregarLista() {
      const container = document.getElementById('listaItens');
      container.innerHTML = '<p class="text-slate-500 text-center py-10">Nenhum item cadastrado ainda.</p>';
    }

    function logout() {
      localStorage.clear();
      location.href = 'login.html';
    }

    // Inicialização
    window.onload = () => {
      const user = JSON.parse(localStorage.getItem('currentUser'));
      if (!user) {
        location.href = 'login.html';
        return;
      }
      document.getElementById('userName').textContent = `Olá, ${user.nome}`;
      carregarLista();
    };
  </script>
</body>
</html>
