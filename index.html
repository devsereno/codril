<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulmão AE - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div class="max-w-4xl mx-auto p-4">

    <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
      <div class="flex items-center gap-3">
        <span class="text-5xl">📦</span>
        <div>
          <h1 class="text-3xl font-bold">PULMÃO AE</h1>
          <p id="userName" class="text-slate-400">Carregando...</p>
        </div>
      </div>
      <button onclick="logout()" class="px-6 py-2 bg-red-500/20 text-red-400 rounded-2xl hover:bg-red-500/30 transition-colors">
        Sair
      </button>
    </div>

    <div class="bg-slate-900 rounded-3xl p-6 mb-8 border border-slate-700">
      <h2 class="text-xl font-semibold mb-5">Novo Cadastro</h2>
      <div class="grid grid-cols-1 gap-4">
        <select id="tipo" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500 text-white">
          <option value="pulmao">Pulmão AE</option>
          <option value="picking">Picking</option>
        </select>
        <input id="endereco" placeholder="Endereço (ex: 101)" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
        <input id="codigo" placeholder="Código do Produto" oninput="this.value = this.value.replace(/[^0-9]/g, '')" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
        <input id="lote" placeholder="Lote" maxlength="20" oninput="this.value = this.value.toUpperCase()" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 uppercase focus:outline-none focus:border-blue-500">
        <input id="descricao" placeholder="Descrição" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 focus:outline-none focus:border-blue-500">
      </div>

      <button id="btnSalvar" onclick="cadastrarProduto()" class="mt-6 w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-semibold transition-all active:scale-[0.99] flex justify-center items-center gap-2">
        <span>💾 Salvar no Sistema</span>
      </button>
    </div>

    <div class="flex gap-4">
      <a href="lista.html" class="flex-1 bg-slate-700 hover:bg-slate-600 py-5 rounded-2xl text-center font-semibold transition-colors">
        📋 Ver Todos os Itens
      </a>
    </div>

  </div>

  <script>
    async function cadastrarProduto() {
      const btn = document.getElementById('btnSalvar');
      
      const dados = {
        tipo: document.getElementById('tipo').value,
        endereco: document.getElementById('endereco').value.trim(),
        codigo_produto: document.getElementById('codigo').value.trim(),
        lote: document.getElementById('lote').value.trim().toUpperCase(),
        descricao: document.getElementById('descricao').value.trim()
      };

      if (!dados.endereco || !dados.codigo_produto || !dados.lote) {
        alert("⚠️ Preencha os campos obrigatórios: Endereço, Código e Lote.");
        return;
      }

      try {
        // Desativa o botão temporariamente para evitar cliques duplos (útil para o Render acordar)
        btn.disabled = true;
        btn.innerHTML = `<span>⏳ Gravando dados...</span>`;
        btn.classList.replace('bg-blue-600', 'bg-slate-700');

        const res = await fetch('https://codril.onrender.com/api/salvar-produto.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        });

        if (!res.ok) {
          throw new Error(`Erro no servidor: ${res.status}`);
        }

        const data = await res.json();
        
        if (data.success) {
          alert("✅ Salvo com sucesso!");
          limparFormulario();
        } else {
          alert("❌ " + (data.message || "Erro ao salvar o produto."));
        }
      } catch (e) {
        console.error("Erro no cadastro:", e);
        alert("❌ Erro de conexão com o servidor. O Render pode estar iniciando, tente novamente em instantes.");
      } finally {
        // Restaura o botão original após o término da requisição
        btn.disabled = false;
        btn.innerHTML = `<span>💾 Salvar no Sistema</span>`;
        btn.classList.replace('bg-slate-700', 'bg-blue-600');
      }
    }

    function limparFormulario() {
      document.getElementById('endereco').value = '';
      document.getElementById('codigo').value = '';
      document.getElementById('lote').value = '';
      document.getElementById('descricao').value = '';
    }

    function logout() {
      localStorage.clear();
      location.href = 'login.html';
    }

    window.onload = function() {
      try {
        const userRaw = localStorage.getItem('currentUser');
        if (!userRaw) {
          // Se não houver login, define um usuário padrão para não quebrar os testes locais
          document.getElementById('userName').textContent = `Olá, Operador`;
          return;
        }
        const user = JSON.parse(userRaw);
        document.getElementById('userName').textContent = `Olá, ${user.nome || 'Operador'}`;
      } catch (err) {
        document.getElementById('userName').textContent = `Olá, Operador`;
      }
    };
  </script>
</body>
</html>
