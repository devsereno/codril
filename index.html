<!DOCTYPE html>
<html lang="pt" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulmão AE - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="manifest.json">
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <style>
    .tech-bg { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); }
    .card { transition: all 0.3s ease; }
    .card:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="tech-bg min-h-screen text-white pb-20">
  <div class="max-w-4xl mx-auto p-4">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-3">
        <span class="text-4xl">📦</span>
        <div>
          <h1 class="text-3xl font-bold tracking-tighter">PULMÃO AE</h1>
          <p class="text-slate-400 text-sm">Gerenciamento Inteligente</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="toggleTheme()" class="p-3 rounded-2xl bg-slate-800 hover:bg-slate-700">
          🌗
        </button>
        <button onclick="logout()" class="px-5 py-2 bg-red-500/20 text-red-400 rounded-2xl hover:bg-red-500/30">
          Sair
        </button>
      </div>
    </div>

    <!-- Formulário de Cadastro -->
    <div class="bg-slate-900/70 backdrop-blur-xl rounded-3xl p-6 mb-8 border border-slate-700">
      <h2 class="text-xl font-semibold mb-5 flex items-center gap-2">
        <span>📍</span> Novo Cadastro
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <select id="tipo" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4">
          <option value="pulmao">Pulmão AE (Aéreo)</option>
          <option value="picking">Picking</option>
        </select>

        <input id="endereco" placeholder="Endereço (ex: 101-2)" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4">
        <input id="codigo" placeholder="Código do Produto" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4">
        <input id="lote" placeholder="Lote" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4">
        <input id="descricao" placeholder="Descrição (opcional)" class="bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 col-span-2">
      </div>

      <button onclick="cadastrarProduto()" 
              class="mt-6 w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-semibold text-lg flex items-center justify-center gap-2">
        <span>💾</span> Salvar no Sistema
      </button>
    </div>

    <!-- Lista de Itens -->
    <div class="bg-slate-900/70 backdrop-blur-xl rounded-3xl p-6 border border-slate-700">
      <h2 class="text-xl font-semibold mb-5">Itens Cadastrados</h2>
      <div id="listaItens" class="space-y-3">
        <!-- Itens serão carregados via JavaScript -->
      </div>
    </div>
  </div>

  <script type="module">
    import { salvarProduto, listarTodos } from './js/armazem.js';

    async function carregarItens() {
      const itens = await listarTodos();
      const container = document.getElementById('listaItens');
      container.innerHTML = '';

      if (itens.length === 0) {
        container.innerHTML = `<p class="text-slate-500 text-center py-10">Nenhum item cadastrado ainda.</p>`;
        return;
      }

      itens.forEach(item => {
        const div = document.createElement('div');
        div.className = "bg-slate-800/80 rounded-2xl p-5 card border border-slate-700";
        div.innerHTML = `
          <div class="flex justify-between">
            <div>
              <span class="px-3 py-1 text-xs rounded-full bg-blue-500/20 text-blue-400">${item.tipo.toUpperCase()}</span>
              <span class="ml-3 font-mono text-lg">${item.endereco}</span>
            </div>
            <div class="text-right">
              <p class="font-semibold">${item.codigo_produto}</p>
              <p class="text-sm text-slate-400">Lote: ${item.lote}</p>
            </div>
          </div>
          \( {item.descricao ? `<p class="mt-3 text-slate-400 text-sm"> \){item.descricao}</p>` : ''}
        `;
        container.appendChild(div);
      });
    }

    window.cadastrarProduto = async () => {
      const dados = {
        tipo: document.getElementById('tipo').value,
        endereco: document.getElementById('endereco').value,
        codigo_produto: document.getElementById('codigo').value,
        lote: document.getElementById('lote').value,
        descricao: document.getElementById('descricao').value
      };

      try {
        await salvarProduto(dados);
        alert("✅ Cadastrado com sucesso!");
        document.getElementById('endereco').value = '';
        document.getElementById('codigo').value = '';
        document.getElementById('lote').value = '';
        document.getElementById('descricao').value = '';
        carregarItens();
      } catch (e) {
        alert(e.message);
      }
    };

    window.toggleTheme = () => document.documentElement.classList.toggle('dark');
    window.logout = () => { localStorage.clear(); location.href = 'login.html'; };

    // Carregar itens ao abrir
    carregarItens();
  </script>
</body>
</html>
