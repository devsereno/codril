<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adesão de Utilizador - Pulmão AE</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4 font-sans">

  <!-- TOAST NOTIFICATION -->
  <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-50 transform transition-all duration-300 opacity-0 pointer-events-none scale-90">
    <div id="toastBg" class="flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl border backdrop-blur-sm">
      <span id="toastIcon" class="text-xl"></span>
      <span id="toastMessage" class="font-medium text-sm"></span>
    </div>
  </div>

  <!-- CONTAINER DE CADASTRO -->
  <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 max-w-md w-full shadow-2xl">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-emerald-600/10 border border-emerald-500/20 rounded-full flex items-center justify-center mx-auto text-3xl mb-4">
        🔑
      </div>
      <h1 class="text-2xl font-extrabold text-emerald-400">Criar Operador</h1>
      <p class="text-xs text-slate-400 mt-1">Preencha os seus dados usando o código de autorização recebido</p>
    </div>

    <form id="formCadastro" onsubmit="realizarAdesaoUsuario(event)" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold text-slate-400 mb-1">Código de Autorização (Invite Key)</label>
        <input type="text" id="addCodigo" required placeholder="Digite o código de 8 dígitos" class="w-full bg-slate-950 border border-slate-850 rounded-xl px-4 py-3.5 text-center focus:outline-none focus:border-emerald-500 font-mono text-lg font-black text-emerald-400 uppercase tracking-widest">
      </div>

      <div class="border-t border-slate-800/80 pt-4 space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1">Nome Completo</label>
          <input type="text" id="addNome" required placeholder="Digite o seu nome" class="w-full bg-slate-950 border border-slate-850 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:border-emerald-500">
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1">Endereço de E-mail</label>
          <input type="email" id="addEmail" required placeholder="exemplo@empresa.com" class="w-full bg-slate-950 border border-slate-850 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:border-emerald-500">
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1">Defina sua Senha</label>
          <input type="password" id="addSenha" required minlength="4" placeholder="Crie sua palavra-passe" class="w-full bg-slate-950 border border-slate-850 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:border-emerald-500 font-mono">
        </div>
      </div>

      <button id="btnCadastrar" type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl text-xs font-bold transition-all active:scale-95 text-white shadow-lg shadow-emerald-600/10 mt-6">
        Confirmar Adesão & Ativar Conta
      </button>
    </form>

    <div class="text-center mt-6 border-t border-slate-800/60 pt-4">
      <a href="login.html" class="text-xs text-slate-400 hover:text-white font-medium transition-all">
        Já tenho cadastro? Aceder ao login →
      </a>
    </div>
  </div>

  <script>
    const API_REGISTO = 'https://codril.onrender.com/api/usuarios.php';

    // RODA IMEDIATAMENTE AO ABRIR A PÁGINA
    window.onload = function() {
      capturarCodigoDaUrl();
    };

    // Lê a Hash da URL (cadastro.html#CODIGO) e auto-preenche
    function capturarCodigoDaUrl() {
      const hash = window.location.hash; // Captura tudo que vem após o caractere '#'
      
      if (hash && hash.length > 1) {
        const codigoLimpo = hash.substring(1).trim().toUpperCase(); // Remove o '#' e limpa espaços
        
        const inputCodigo = document.getElementById('addCodigo');
        inputCodigo.value = codigoLimpo;
        
        // Bloqueia levemente o campo para o utilizador saber que já foi capturado com sucesso
        inputCodigo.classList.add('border-emerald-500');
        
        // Dá o foco diretamente no campo de Nome Completo para facilitar o preenchimento!
        document.getElementById('addNome').focus();
        
        mostrarAviso("Código de convite capturado automaticamente!", "sucesso");
      }
    }

    function mostrarAviso(mensagem, tipo = 'sucesso') {
      const toast = document.getElementById('toast');
      const toastBg = document.getElementById('toastBg');
      const toastIcon = document.getElementById('toastIcon');
      const toastMessage = document.getElementById('toastMessage');

      if (tipo === 'sucesso') {
        toastBg.className = "flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl border bg-emerald-500/90 border-emerald-400 text-white backdrop-blur-sm";
        toastIcon.textContent = "✅";
      } else if (tipo === 'erro') {
        toastBg.className = "flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl border bg-red-500/90 border-red-400 text-white backdrop-blur-sm";
        toastIcon.textContent = "❌";
      } else {
        toastBg.className = "flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl border bg-amber-500/90 border-amber-400 text-white backdrop-blur-sm";
        toastIcon.textContent = "⚠️";
      }

      toastMessage.textContent = message;
      toast.classList.remove('opacity-0', 'pointer-events-none', 'scale-90', 'top-5');
      toast.classList.add('opacity-100', 'scale-100', 'top-8');

      setTimeout(() => {
        toast.classList.remove('opacity-100', 'scale-100', 'top-8');
        toast.classList.add('opacity-0', 'pointer-events-none', 'scale-90', 'top-5');
      }, 3000);
    }

    async function realizarAdesaoUsuario(e) {
      e.preventDefault();

      const btn = document.getElementById('btnCadastrar');
      const codigo = document.getElementById('addCodigo').value.trim().toUpperCase();
      const nome = document.getElementById('addNome').value.trim();
      const email = document.getElementById('addEmail').value.trim();
      const senha = document.getElementById('addSenha').value;

      try {
        btn.disabled = true;
        btn.textContent = "Validando código e ativando conta...";

        const res = await fetch(API_REGISTO, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'REGISTER_WITH_INVITE',
            codigo,
            nome,
            email,
            senha
          })
        });

        const data = await res.json();

        if (data.success) {
          mostrarAviso("Adesão efetuada com sucesso! Redirecionando...", "sucesso");
          document.getElementById('formCadastro').reset();
          
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          mostrarAviso(data.message || "Erro ao realizar adesão.", "erro");
        }
      } catch (err) {
        mostrarAviso("Erro de conexão ao servidor.", "erro");
      } finally {
        btn.disabled = false;
        btn.textContent = "Confirmar Adesão & Ativar Conta";
      }
    }
  </script>
</body>
</html>
