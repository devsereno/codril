<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulmão AE - Lista</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div class="max-w-4xl mx-auto p-4">

    <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
      <div>
        <h1 class="text-3xl font-bold">Itens Cadastrados</h1>
        <p id="totalItens" class="text-slate-400 text-sm">Total: 0</p>
      </div>
      <div class="flex gap-3">
        <button onclick="carregarItens()" 
                class="px-6 py-3 bg-red-600 hover:bg-red-500 rounded-2xl text-sm font-medium flex items-center gap-2 transition-all active:scale-95">
          🔄 Atualizar Lista
        </button>
        <a href="index.html" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-2xl text-sm font-medium">
          + Novo Cadastro
        </a>
      </div>
    </div>

    <input id="busca" placeholder="🔍 Buscar por lote, código ou endereço..." 
           class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-6 focus:outline-none focus:border-blue-500" 
           oninput="filtrarItens()">

    <div id="listaItens" class="space-y-4"></div>
  </div>

  <script>
    let todosOsItens = [];

    async function carregarItens() {
      const container = document.getElementById('listaItens');
      container.innerHTML = `<p class="text-center py-12 text-slate-400">Carregando itens...</p>`;

      try {
        const res = await fetch('https://codril.onrender.com/api/salvar-produto.php');
        const data = await res.json();

        if (data.success && data.itens) {
          todosOsItens = data.itens;
          document.getElementById('totalItens').textContent = `Total: ${data.itens.length}`;
          renderizarItens(todosOsItens);
        } else {
          exibirMensagemVazia();
        }
      } catch (e) {
        console.error(e);
        container.innerHTML = `<p class="text-red-400 text-center py-12">Erro ao carregar lista</p>`;
      }
    }

    function renderizarItens(itens) {
      const container = document.getElementById('listaItens');
      if (itens.length === 0) {
        exibirMensagemVazia();
        return;
      }

      let html = '';
      itens.forEach(item => {
        // Correção das barras e parênteses que quebravam a string literal
        const descricaoHtml = item.descricao && item.descricao.trim() !== '' 
          ? `<p class="text-slate-400 text-sm mt-2">${item.descricao}</p>` 
          : '';

        // Formatação visual da data para o padrão PT-BR
        let dataExibicao = '';
        if (item.data_cadastro) {
          const partes = item.data_cadastro.substring(0,10).split('-');
          dataExibicao = partes.length === 3 ? `${partes[2]}/${partes[1]}/${partes[0]}` : item.data_cadastro.substring(0,10);
        }

        html += `
          <div class="bg-slate-900 p-5 rounded-3xl border border-slate-700">
            <div class="flex justify-between mb-3">
              <span class="px-4 py-1 bg-blue-500/20 text-blue-400 rounded-full text-sm font-semibold">${(item.tipo || 'N/A').toUpperCase()}</span>
              <span class="text-xs text-slate-500 font-mono">${dataExibicao}</span>
            </div>
            
            <p class="text-2xl font-mono text-emerald-400 font-bold">${item.endereco || 'Sem endereço'}</p>
            
            <p class="text-lg mt-1 text-slate-300">
              Código: 
              <span onclick="filtrarPorCodigo('${item.codigo_produto}')" 
                    class="text-blue-400 underline cursor-pointer hover:text-blue-300 font-mono font-medium">
                ${item.codigo_produto || 'N/A'}
              </span> 
              • Lote: <span class="text-orange-400 font-mono">${item.lote || 'N/A'}</span>
            </p>
            
            ${descricaoHtml}
          </div>`;
      });
      container.innerHTML = html;
    }

    function exibirMensagemVazia() {
      const container = document.getElementById('listaItens');
      container.innerHTML = `
        <div class="bg-slate-900 rounded-3xl p-12 text-center border border-slate-700">
          <p class="text-6xl mb-4">📦</p>
          <p class="text-xl text-slate-300">Nenhum item encontrado</p>
        </div>`;
    }

    // Filtro inteligente pela barra de busca
    function filtrarItens() {
      const termo = document.getElementById('busca').value.toLowerCase().trim();
      
      const filtrados = todosOsItens.filter(item => {
        return (item.endereco || '').toLowerCase().includes(termo) ||
               (item.codigo_produto || '').toLowerCase().includes(termo) ||
               (item.lote || '').toLowerCase().includes(termo) ||
               (item.descricao || '').toLowerCase().includes(termo) ||
               (item.tipo || '').toLowerCase().includes(termo);
      });

      renderizarItens(filtrados);
    }

    // Filtro rápido ao clicar no link do Código
    function filtrarPorCodigo(codigo) {
      if (!codigo) return;
      
      const filtrados = todosOsItens.filter(item => 
        (item.codigo_produto || '') === codigo
      );
      
      renderizarItens(filtrados);
      
      // Insere o código na barra de busca para o operador saber o que está filtrando
      document.getElementById('busca').value = codigo;
    }

    window.onload = carregarItens;
  </script>
</body>
</html>
