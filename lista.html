<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Divergências</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
  <style>
    /* Estilo de impressão: Zebrado e limpo */
    @media print {
      .no-print { display: none !important; }
      body { background: white; color: black; }
      table { width: 100%; border-collapse: collapse; }
      tr:nth-child(even) { background-color: #f3f4f6; }
      th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    }
  </style>
</head>
<body class="bg-[#020617] text-white min-h-screen p-4 font-sans">

  <div class="max-w-2xl mx-auto">
    <div class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-xl font-black text-blue-500">Gestão de Divergências</h1>
        <p id="infoStatus" class="text-[10px] opacity-60">Carregando...</p>
      </div>
      <div class="flex gap-2 no-print">
        <button onclick="window.print()" class="bg-slate-800 px-3 py-1 rounded-lg text-[10px] font-bold">Imprimir</button>
        <button onclick="exportarPDF()" class="bg-blue-600 px-3 py-1 rounded-lg text-[10px] font-bold">PDF</button>
      </div>
    </div>

    <div class="no-print flex flex-col gap-3 mb-6">
      <input type="text" id="filtro" oninput="paginaAtual = 1; renderizar()" placeholder="🔍 Buscar SKU, Lote ou Endereço..." class="w-full bg-slate-900 border border-slate-800 rounded-xl px-5 py-3 text-xs">
      <select id="itensPorPagina" onchange="paginaAtual = 1; renderizar()" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-5 py-3 text-xs">
        <option value="5">5 por pág.</option>
        <option value="10" selected>10 por pág.</option>
        <option value="20">20 por pág.</option>
      </select>
    </div>

    <div id="gridCards" class="grid grid-cols-1 gap-4"></div>

    <div id="paginacao" class="no-print flex justify-center gap-2 mt-6"></div>
  </div>

  <script>
    let todosOsDados = [];
    let paginaAtual = 1;

    async function carregarDados() {
      try {
        const response = await fetch("https://codril.onrender.com/api/salvar-produto.php");
        const data = await response.json();
        todosOsDados = data.itens || [];
        renderizar();
      } catch (err) { document.getElementById('infoStatus').innerText = "Erro ao carregar."; }
    }

    function renderizar() {
      const filtro = document.getElementById('filtro').value.toLowerCase();
      const limite = parseInt(document.getElementById('itensPorPagina').value);
      const filtrados = todosOsDados.filter(i => 
        (i.endereco?.toLowerCase().includes(filtro)) || (i.codigo_produto?.toLowerCase().includes(filtro)) || (i.lote?.toLowerCase().includes(filtro))
      );
      
      const inicio = (paginaAtual - 1) * limite;
      const paginados = filtrados.slice(inicio, inicio + limite);

      document.getElementById('gridCards').innerHTML = paginados.map(item => `
        <div class="bg-slate-900 border border-slate-800 p-5 rounded-3xl shadow-lg">
          <div class="flex justify-between items-center mb-3">
            <h2 class="text-lg font-black text-emerald-400">Endereço: ${item.endereco || '-'}</h2>
            <span class="px-2 py-1 bg-slate-800 rounded-full text-[9px] font-bold uppercase">${item.status_estoque || 'Normal'}</span>
          </div>
          <div class="grid grid-cols-2 gap-2 text-xs">
            <p class="opacity-70">SKU: <span class="text-white font-bold">${item.codigo_produto || '-'}</span></p>
            <p class="opacity-70">Lote: <span class="text-white font-bold">${item.lote || '-'}</span></p>
            <p class="opacity-70 col-span-2">Quantidade: <span class="text-white font-bold">${item.quantidade || '1'}</span></p>
          </div>
        </div>
      `).join('');

      document.getElementById('infoStatus').innerText = `Total: ${filtrados.length} itens`;
      renderizarPaginacao(Math.ceil(filtrados.length / limite));
    }

    function renderizarPaginacao(total) {
      const container = document.getElementById('paginacao');
      container.innerHTML = Array.from({length: total}, (_, i) => i + 1).map(p => `
        <button onclick="paginaAtual=${p}; renderizar()" class="px-3 py-1 rounded bg-slate-800 text-[10px] ${paginaAtual === p ? 'ring-2 ring-blue-500' : ''}">${p}</button>
      `).join('');
    }

    function exportarPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.text("Relatório de Divergências", 14, 15);
      doc.autoTable({
        head: [['Endereço', 'SKU', 'Lote', 'Qtd', 'Status']],
        body: todosOsDados.map(i => [i.endereco, i.codigo_produto, i.lote, i.quantidade, i.status_estoque]),
        startY: 20,
        theme: 'striped'
      });
      doc.save("divergencias.pdf");
    }

    carregarDados();
  </script>
</body>
</html>
