<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque Ativo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .deletando { animation: shrink 0.4s ease-out forwards; }
    @keyframes shrink { to { opacity: 0; transform: scale(0.5); } }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 font-sans">

  <div class="max-w-4xl mx-auto">
    <!-- Cabeçalho -->
    <div class="flex justify-between items-center mb-6 border-b border-slate-900 pb-4">
      <div>
        <h1 class="text-2xl font-extrabold text-blue-400">Estoque Ativo</h1>
        <p id="infoPagina" class="text-slate-400 text-xs">A carregar...</p>
      </div>
      <div class="flex gap-2">
        <button onclick="gerarRelatorio()" class="bg-blue-600 p-2 px-4 rounded-xl text-xs font-bold">📄 PDF</button>
        <a href="index.html" class="px-4 py-2 bg-slate-900 border border-slate-800 rounded-xl text-xs font-bold">⬅️ Novo</a>
      </div>
    </div>

    <!-- Grid de Cards -->
    <div id="gridCards" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
  </div>

  <script>
    let todosItens = [];

    function renderizar() {
      const container = document.getElementById('gridCards');
      if (todosItens.length === 0) {
        container.innerHTML = `<p class="text-slate-500 text-center col-span-full mt-10">Nenhum item encontrado.</p>`;
        return;
      }
      
      container.innerHTML = todosItens.map(item => `
        <div id="card-${item.id}" class="bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-xl transition-all">
          <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-3">
              <h2 class="text-xl font-black text-emerald-400 font-mono">${item.endereco}</h2>
              <button onclick="confirmarExclusao(${item.id})" class="text-slate-600 hover:text-red-500 transition-colors">🗑️</button>
            </div>
            <span class="px-3 py-1 rounded-full text-[9px] font-bold border ${item.status_estoque === 'Faltando' ? 'text-red-400 border-red-900 bg-red-950/30' : 'text-yellow-400 border-yellow-900 bg-yellow-950/30'} uppercase">${item.status_estoque}</span>
          </div>
          <div class="grid grid-cols-2 gap-2 text-xs text-slate-400">
            <div>SKU: <span class="font-bold text-white">${item.codigo_produto}</span></div>
            <div>Lote: <span class="font-bold text-white">${item.lote}</span></div>
            <div>Qtd: <span class="font-bold text-white">${item.quantidade}</span></div>
          </div>
        </div>
      `).join('');
    }

    function confirmarExclusao(id) {
      const card = document.getElementById(`card-${id}`);
      card.innerHTML = `
        <div class="flex flex-col items-center justify-center h-full p-4 bg-red-950/20 border border-red-900/50 rounded-3xl animate-in fade-in">
          <p class="text-sm mb-4 text-center">Excluir este registo?</p>
          <div class="flex gap-3">
            <button onclick="renderizar()" class="px-4 py-2 bg-slate-800 rounded-xl text-xs">Não</button>
            <button onclick="executarDelecao(${id})" class="px-4 py-2 bg-red-600 rounded-xl text-xs font-bold">Sim</button>
          </div>
        </div>
      `;
    }

    async function executarDelecao(id) {
      const el = document.getElementById(`card-${id}`);
      el.classList.add('deletando');
      const user = JSON.parse(sessionStorage.getItem('usuarioLogado'));
      try {
        await fetch(`https://codril.onrender.com/api/deletar-produto.php?id=${id}&token=${user.token}`);
        todosItens = todosItens.filter(i => i.id !== id);
        setTimeout(renderizar, 400);
      } catch (err) { el.classList.remove('deletando'); }
    }

    async function carregarDados() {
      const info = document.getElementById('infoPagina');
      const user = JSON.parse(sessionStorage.getItem('usuarioLogado'));
      if(!user) { window.location.href = 'login.html'; return; }
      try {
        const res = await fetch(`https://codril.onrender.com/api/salvar-produto.php?token=${user.token}`);
        const text = await res.text(); // Lê como texto primeiro
        try {
          const data = JSON.parse(text);
          if (data.success) {
            todosItens = data.itens || [];
            renderizar();
            info.textContent = `Total: ${todosItens.length} itens`;
          }
        } catch (e) {
          info.innerHTML = `<span class="text-red-500">Erro de API: Resposta inválida do servidor.</span>`;
        }
      } catch (err) {
        info.innerHTML = `<span class="text-red-500">Erro de conexão com o servidor.</span>`;
      }
    }

    function gerarRelatorio() {
      const win = window.open('', '_blank');
      win.document.write(`<html><head><title>Relatório</title><style>table{width:100%;border-collapse:collapse;font-family:sans-serif;} th{background:#e5e7eb;padding:10px;border:1px solid #ccc;text-align:center;} td{padding:8px;border:1px solid #ccc;text-align:center;} tr:nth-child(even){background:#f3f4f6;}</style></head><body><h1>Estoque</h1><table><tr><th>Endereço</th><th>SKU</th><th>Lote</th><th>Qtd</th><th>Status</th></tr>${todosItens.map(i => `<tr><td>${i.endereco}</td><td>${i.codigo_produto}</td><td>${i.lote}</td><td>${i.quantidade}</td><td>${i.status_estoque}</td></tr>`).join('')}</table></body></html>`);
      win.document.close();
      win.print();
    }

    window.onload = carregarDados;
  </script>
</body>
</html>
