<!DOCTYPE html>
<html lang="pt-PT" id="htmlRoot" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Divergências</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    function aplicarTema() {
      const isDark = localStorage.getItem('modoEscuro') === 'true';
      document.getElementById('htmlRoot').className = isDark ? 'dark' : '';
    }
    function alternarTema() {
      localStorage.setItem('modoEscuro', localStorage.getItem('modoEscuro') !== 'true');
      aplicarTema();
    }
  </script>
  <style>
    .dark body { background-color: #020617; color: white; }
    .light body { background-color: #f1f5f9; color: #0f172a; }
    .card { background-color: #0f172a; border: 1px solid #1e293b; }
    .light .card { background-color: #ffffff; border: 1px solid #e2e8f0; }
  </style>
</head>
<body class="p-4 transition-colors duration-300">
  <div class="max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-black text-blue-500">Gestão de Divergências</h1>
      <div class="flex gap-2">
        <button onclick="alternarTema()" class="bg-slate-800 p-2 rounded-xl">🌓</button>
        <a href="index.html" class="border border-slate-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-700">Nova</a>
      </div>
    </div>
    
    <input type="text" placeholder="🔍 Buscar..." class="w-full p-4 mb-4 rounded-2xl bg-slate-900 border border-slate-700 text-sm">

    <div id="gridCards" class="grid grid-cols-1 gap-4">
      <!-- Cards renderizados via JS -->
    </div>

    <div class="flex justify-center mt-8 gap-2">
      <button onclick="mudarPagina(-1)" class="bg-slate-800 px-6 py-3 rounded-2xl text-xs font-bold">Anterior</button>
      <button onclick="mudarPagina(1)" class="bg-slate-800 px-6 py-3 rounded-2xl text-xs font-bold">Próximo</button>
    </div>
  </div>
  <script>
    let paginaAtual = 1;
    function mudarPagina(dir) {
      paginaAtual = Math.max(1, paginaAtual + dir);
      console.log("Navegando para página:", paginaAtual);
    }
    aplicarTema();
  </script>
</body>
</html>
