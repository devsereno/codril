<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Divergências</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020617] text-white min-h-screen p-4 font-sans">

  <div class="max-w-4xl mx-auto">
    <!-- Cabeçalho -->
    <div class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-xl font-black text-blue-500">Gestão de Divergências</h1>
        <p id="infoStatus" class="text-[10px] opacity-60">A carregar...</p>
      </div>
      <div class="flex gap-2">
        <button class="bg-blue-600 px-3 py-1 rounded-xl text-[10px] font-bold">PDF</button>
        <a href="index.html" class="bg-slate-800 px-3 py-1 rounded-xl text-[10px] font-bold">Novo</a>
      </div>
    </div>

    <select id="porPagina" onchange="carregarDados()" class="w-full bg-slate-900 border border-slate-800 p-3 rounded-xl text-xs mb-3">
      <option value="10">10 itens por página</option>
      <option value="20">20 itens por página</option>
      <option value="50">50 itens por página</option>
    </select>
    
    <input type="text" id="filtro" oninput="carregarDados()" placeholder="🔍 Buscar por SKU, Lote ou Endereço..." class="w-full bg-slate-900 border border-slate-800 rounded-xl px-5 py-4 text-xs mb-4">

    <div id="gridCards" class="grid grid-cols-1 gap-4">
      <!-- Dados -->
    </div>

    <div class="flex justify-between mt-6">
      <button onclick="mudarPagina(-1)" class="bg-slate-800 px-6 py-3 rounded-xl text-xs font-bold">Anterior</button>
      <button onclick="mudarPagina(1)" class="bg-slate-800 px-6 py-3 rounded-xl text-xs font-bold">Próximo</button>
    </div>
  </div>

  <script>
    let pagina = 1;
    const API_URL = "https://codril.onrender.com/api/listar-produtos.php";

    async function carregarDados() {
      const info = document.getElementById('infoStatus');
      const limite = document.getElementById('porPagina').value;
      const q = document.getElementById('filtro').value;
      
      try {
        info.innerText = "A ligar ao servidor...";
        const response = await fetch(`${API_URL}?page=${pagina}&limit=${limite}&q=${q}`);
        const data = await response.json();
        
        console.log("Dados recebidos:", data);

        const grid = document.getElementById('gridCards');
        grid.innerHTML = (data.items || []).map(item => `
          <div class="bg-slate-900 border border-slate-800 p-5 rounded-3xl">
            <div class="flex justify-between items-center mb-2">
              <h2 class="text-lg font-black text-emerald-500">${item.endereco}</h2>
              <span class="text-[9px] font-bold px-2 py-1 rounded-full bg-slate-800">${item.status}</span>
            </div>
            <div class="flex justify-between text-[11px] opacity-70">
              <span>SKU: ${item.codigo_produto || item.sku}</span>
              <span>Lote: ${item.lote}</span>
            </div>
          </div>
        `).join('');
        
        info.innerText = `Página ${pagina} | Total: ${data.totalItems || 0}`;
      } catch (err) {
        info.innerText = "Erro ao carregar dados.";
        console.error("Erro completo:", err);
      }
    }

    function mudarPagina(dir) {
      pagina = Math.max(1, pagina + dir);
      carregarDados();
    }

    carregarDados();
  </script>
</body>
</html>
