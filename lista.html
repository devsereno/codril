<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulmão AE - Lista de Itens</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div class="max-w-4xl mx-auto p-4">

    <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
      <div class="flex items-center gap-3">
        <span class="text-4xl">📋</span>
        <div>
          <h1 class="text-3xl font-bold">Itens Cadastrados</h1>
          <p class="text-slate-400">Total de registros</p>
        </div>
      </div>
      <a href="index.html" class="px-5 py-2 bg-slate-700 hover:bg-slate-600 rounded-2xl">
        ← Novo Cadastro
      </a>
    </div>

    <!-- Busca -->
    <div class="mb-6">
      <input id="busca" type="text" placeholder="🔍 Buscar por lote, código ou endereço..." 
             onkeyup="filtrarItens()" 
             class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 text-white">
    </div>

    <!-- Lista -->
    <div id="listaItens" class="space-y-4">
      <!-- Itens serão carregados aqui -->
    </div>
  </div>

  <script>
    async function carregarItens() {
      const container = document.getElementById('listaItens');
      container.innerHTML = '<p class="text-slate-500 text-center py-10">Carregando itens...</p>';

      try {
        const res = await fetch('https://codril.onrender.com/api/salvar-produto.php');
        // Por enquanto usamos uma mensagem (vamos melhorar a API depois)
        container.innerHTML = `
          <div class="bg-slate-900 rounded-3xl p-8 text-center border border-slate-700">
            <p class="text-6xl mb-4">📦</p>
            <p class="text-xl text-slate-300">Sistema funcionando!</p>
            <p class="text-slate-500 mt-2">Os itens cadastrados aparecerão aqui em breve.</p>
          </div>`;
      } catch (e) {
        container.innerHTML = `<p class="text-red-400 text-center py-10">Erro ao carregar lista</p>`;
      }
    }

    function filtrarItens() {
      // Futuramente implementaremos busca real
      carregarItens();
    }

    // Carrega ao abrir a página
    window.onload = carregarItens;
  </script>
</body>
</html>
