<!DOCTYPE html>
<html lang="pt-PT" id="htmlRoot" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULMÃO AE - Consulta de Stock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Estilos base para o Modo Escuro */
    .dark body { background-color: #020617; color: white; }
    .light body { background-color: #f1f5f9; color: #0f172a; }
    .card { background-color: #0f172a; border: 1px solid #1e293b; }
    .light .card { background-color: #ffffff; border: 1px solid #e2e8f0; }
  </style>
  <script>
    // Gerenciador de tema persistente
    function aplicarTema() {
      const isDark = localStorage.getItem('modoEscuro') !== 'false';
      if (isDark) document.getElementById('htmlRoot').classList.add('dark');
      else document.getElementById('htmlRoot').classList.remove('dark');
    }
    function alternarTema() {
      const isDark = document.getElementById('htmlRoot').classList.contains('dark');
      localStorage.setItem('modoEscuro', isDark ? 'false' : 'true');
      aplicarTema();
    }
  </script>
</head>
<body class="min-h-screen relative font-sans transition-colors duration-300">

  <!-- Notificação e Modal (Mantidos como no seu original) -->
  <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-50 transform transition-all duration-300 opacity-0 pointer-events-none scale-90">
    <div id="toastBg" class="flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl border backdrop-blur-sm">
      <span id="toastIcon"></span>
      <span id="toastMessage" class="text-sm font-medium"></span>
    </div>
  </div>

  <div class="max-w-4xl mx-auto p-4">
    <div class="flex justify-between items-center mb-6 border-b border-slate-700/30 pb-4">
      <div class="flex items-center gap-3">
        <span class="text-3xl">📋</span>
        <div>
          <h1 class="text-xl font-extrabold">Estoque Ativo</h1>
          <p id="contadorItens" class="text-slate-500 text-[10px] font-semibold">Carregando...</p>
        </div>
      </div>
      <div class="flex gap-2">
        <button onclick="alternarTema()" class="bg-slate-800 p-2 rounded-xl text-lg">🌓</button>
        <a href="index.html" class="px-4 py-2 bg-blue-600 rounded-xl text-[10px] font-bold text-white">Novo</a>
      </div>
    </div>

    <!-- Paginação e Busca -->
    <div class="flex flex-col gap-3 mb-6">
      <select id="porPagina" onchange="resetarBusca()" class="bg-slate-900 border border-slate-700 p-3 rounded-xl text-xs w-full">
        <option value="10">10 itens/pág</option>
        <option value="20">20 itens/pág</option>
        <option value="50">50 itens/pág</option>
      </select>
      <input id="filtro" oninput="resetarBusca()" placeholder="🔍 Pesquisar..." type="text" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-5 py-4 text-sm">
    </div>

    <div id="gridCards" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>

    <!-- Controles de Paginação -->
    <div class="flex justify-center mt-8 gap-2 items-center">
      <button onclick="mudarPagina(-1)" class="bg-slate-800 px-6 py-3 rounded-xl text-xs font-bold">Anterior</button>
      <span id="infoPagina" class="text-xs font-bold opacity-60">Pág 1</span>
      <button onclick="mudarPagina(1)" class="bg-slate-800 px-6 py-3 rounded-xl text-xs font-bold">Próximo</button>
    </div>
  </div>

  <script>
    let pagina = 1;
    let itensTotais = [];

    async function carregarDados() {
      // Mantenha sua lógica de fetch aqui
      try {
        const res = await fetch('https://codril.onrender.com/api/listar-produtos.php');
        const data = await res.json();
        if (data.success) {
          itensTotais = data.dados;
          renderizar();
        }
      } catch (e) { console.error(e); }
    }

    function renderizar() {
      const busca = document.getElementById('filtro').value.toLowerCase();
      const limite = parseInt(document.getElementById('porPagina').value);
      
      const filtrados = itensTotais.filter(i => i.endereco.toLowerCase().includes(busca));
      const inicio = (pagina - 1) * limite;
      const paginaItens = filtrados.slice(inicio, inicio + limite);

      const grid = document.getElementById('gridCards');
      grid.innerHTML = paginaItens.map(item => `
        <div class="card p-5 rounded-3xl">
          <h2 class="text-lg font-black text-emerald-400">${item.endereco}</h2>
          <div class="text-xs opacity-70">SKU: ${item.codigo_produto} | Qtd: ${item.quantidade}</div>
        </div>
      `).join('');
      
      document.getElementById('infoPagina').textContent = `Pág ${pagina}`;
      document.getElementById('contadorItens').textContent = `${filtrados.length} registros encontrados`;
    }

    function mudarPagina(dir) {
      pagina = Math.max(1, pagina + dir);
      renderizar();
    }

    function resetarBusca() { pagina = 1; renderizar(); }

    aplicarTema();
    carregarDados();
  </script>
</body>
</html>
