<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulmão AE - Lista</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div class="max-w-4xl mx-auto p-4">

    <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
      <h1 class="text-3xl font-bold">Itens Cadastrados</h1>
      <div class="flex gap-3">
        <button onclick="carregarItens()" 
                class="px-6 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-sm font-medium flex items-center gap-2 transition">
          🔄 Atualizar Lista
        </button>
        <a href="index.html" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-2xl text-sm font-medium">
          + Novo Cadastro
        </a>
      </div>
    </div>

    <input id="busca" placeholder="🔍 Buscar por lote, código ou endereço..." 
           class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-6" onkeyup="filtrarItens()">

    <div id="listaItens" class="space-y-4"></div>
  </div>

  <script>
    async function carregarItens() {
      const container = document.getElementById('listaItens');
      container.innerHTML = `
        <div class="text-center py-12">
          <div class="animate-spin w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full mx-auto mb-4"></div>
          <p class="text-slate-400">Carregando itens...</p>
        </div>`;

      try {
        const res = await fetch('https://codril.onrender.com/api/salvar-produto.php');
        const data = await res.json();

        if (data.success && data.itens && data.itens.length > 0) {
          let html = '';
          data.itens.forEach(item => {
            html += `
              <div class="bg-slate-900 p-5 rounded-3xl border border-slate-700">
                <div class="flex justify-between mb-3">
                  <span class="px-4 py-1 bg-blue-500/20 text-blue-400 rounded-full text-sm">${item.tipo.toUpperCase()}</span>
                  <span class="text-xs text-slate-500">${item.data_cadastro ? item.data_cadastro.substring(0,10) : ''}</span>
                </div>
                <p class="text-2xl font-mono">${item.endereco}</p>
                <p class="text-lg">${item.codigo_produto} • ${item.lote}</p>
                \( {item.descricao ? `<p class="text-slate-400 text-sm mt-2"> \){item.descricao}</p>` : ''}
              </div>`;
          });
          container.innerHTML = html;
        } else {
          container.innerHTML = `
            <div class="bg-slate-900 rounded-3xl p-12 text-center border border-slate-700">
              <p class="text-6xl mb-4">📦</p>
              <p class="text-xl text-slate-300">Nenhum item cadastrado ainda</p>
            </div>`;
        }
      } catch (e) {
        container.innerHTML = `
          <div class="text-center py-12 text-red-400">
            ❌ Erro ao carregar lista<br>
            <button onclick="carregarItens()" class="mt-4 px-6 py-2 bg-red-500/20 rounded-2xl">Tentar novamente</button>
          </div>`;
      }
    }

    function filtrarItens() {
      carregarItens();
    }

    window.onload = carregarItens;
  </script>
</body>
</html>
