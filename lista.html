<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Divergências - Lista</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.autotable.min.js"></script>
</head>
<body class="bg-[#020617] text-white min-h-screen p-4 font-sans">

  <div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-end mb-6">
      <div>
        <h1 class="text-2xl font-black text-blue-500">Divergências</h1>
        <p id="infoStatus" class="text-xs opacity-50">Carregando dados...</p>
      </div>
      <div class="flex gap-2">
        <button onclick="imprimirLista()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-xs font-bold">Imprimir</button>
        <button onclick="exportarPDF()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-xs font-bold">Exportar PDF</button>
      </div>
    </div>

    <!-- Filtros e Paginação -->
    <div class="flex flex-col md:flex-row gap-4 mb-6 bg-slate-900 p-4 rounded-xl border border-slate-800">
      <input type="text" id="filtro" oninput="paginaAtual = 1; renderizar()" placeholder="🔍 Pesquisar (SKU, Lote, Endereço)..." class="flex-1 bg-transparent border-b border-slate-700 p-2 text-sm focus:outline-none focus:border-blue-500">
      <select id="itensPorPagina" onchange="paginaAtual = 1; renderizar()" class="bg-slate-800 text-xs p-2 rounded-lg">
        <option value="5">5 por pág.</option>
        <option value="10" selected>10 por pág.</option>
        <option value="20">20 por pág.</option>
      </select>
    </div>

    <!-- Tabela -->
    <div class="overflow-x-auto bg-slate-900 rounded-xl border border-slate-800">
      <table class="w-full text-left text-xs">
        <thead class="bg-slate-950 text-slate-400">
          <tr>
            <th class="p-4">Endereço</th>
            <th class="p-4">SKU</th>
            <th class="p-4">Lote</th>
            <th class="p-4">Status</th>
          </tr>
        </thead>
        <tbody id="tabelaCorpo"></tbody>
      </table>
    </div>

    <!-- Paginação -->
    <div id="paginacao" class="flex justify-center gap-2 mt-6"></div>
  </div>

  <script>
    let todosOsDados = [];
    let paginaAtual = 1;

    async function carregarDados() {
      try {
        const response = await fetch("https://codril.onrender.com/api/salvar-produto.php");
        const data = await response.json();
        todosOsDados = data.dados || data || [];
        renderizar();
      } catch (err) {
        document.getElementById('infoStatus').innerText = "Erro ao carregar dados.";
      }
    }

    function renderizar() {
      const filtro = document.getElementById('filtro').value.toLowerCase();
      const limite = parseInt(document.getElementById('itensPorPagina').value);
      
      const filtrados = todosOsDados.filter(i => 
        (i.endereco?.toLowerCase().includes(filtro)) ||
        (i.codigo_produto?.toLowerCase().includes(filtro)) ||
        (i.lote?.toLowerCase().includes(filtro))
      );

      const totalPaginas = Math.ceil(filtrados.length / limite);
      const inicio = (paginaAtual - 1) * limite;
      const paginados = filtrados.slice(inicio, inicio + limite);

      const corpo = document.getElementById('tabelaCorpo');
      corpo.innerHTML = paginados.map(item => `
        <tr class="border-t border-slate-800 hover:bg-slate-800/50">
          <td class="p-4 font-bold text-emerald-400">${item.endereco || '-'}</td>
          <td class="p-4">${item.codigo_produto || '-'}</td>
          <td class="p-4">${item.lote || '-'}</td>
          <td class="p-4"><span class="px-2 py-1 bg-slate-800 rounded text-[10px]">${item.status || 'Pendente'}</span></td>
        </tr>
      `).join('');

      document.getElementById('infoStatus').innerText = `Total: ${filtrados.length} itens`;
      renderizarPaginacao(totalPaginas);
    }

    function renderizarPaginacao(total) {
      const container = document.getElementById('paginacao');
      container.innerHTML = Array.from({length: total}, (_, i) => i + 1).map(p => `
        <button onclick="paginaAtual=${p}; renderizar()" class="px-3 py-1 rounded ${paginaAtual === p ? 'bg-blue-600' : 'bg-slate-800'} text-xs">${p}</button>
      `).join('');
    }

    function imprimirLista() { window.print(); }

    function exportarPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.text("Relatorio de Divergencias", 14, 15);
      doc.autoTable({
        head: [['Endereco', 'SKU', 'Lote', 'Status']],
        body: todosOsDados.map(i => [i.endereco, i.codigo_produto, i.lote, i.status]),
        startY: 20
      });
      doc.save("divergencias.pdf");
    }

    carregarDados();
  </script>
</body>
</html>
