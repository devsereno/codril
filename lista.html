<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Divergências</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .deletando { animation: shrink 0.4s ease-out forwards; }
    @keyframes shrink { to { opacity: 0; transform: scale(0.5); } }
  </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 font-sans">

  <div class="max-w-4xl mx-auto">
    <!-- Cabeçalho -->
    <div class="flex justify-between items-center mb-6 border-b border-slate-900 pb-4">
      <div>
        <h1 class="text-2xl font-extrabold text-blue-400">Gestão de Divergências</h1>
        <p id="infoPagina" class="text-slate-400 text-xs">Carregando dados operacionais...</p>
      </div>
      <div class="flex gap-2">
        <button onclick="gerarRelatorio()" class="bg-blue-600 hover:bg-blue-500 p-2 px-4 rounded-xl text-xs font-bold transition-all">📄 PDF</button>
        <a href="index.html" class="px-4 py-2 bg-slate-900 border border-slate-800 rounded-xl text-xs font-bold transition-all hover:bg-slate-800">⬅️ Novo</a>
      </div>
    </div>

    <!-- Controles -->
    <div class="flex flex-col gap-3 mb-6">
      <select id="itensPorPagina" onchange="mudarItens()" class="bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs w-full outline-none">
        <option value="10">10 itens por página</option>
        <option value="15">15 itens por página</option>
      </select>

      <input type="text" id="campoBusca" placeholder="🔍 Buscar por SKU, Lote ou Endereço..." 
             onkeyup="filtrarDados()" class="bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs w-full outline-none focus:border-blue-500">
    </div>

    <!-- Grid de resultados -->
    <div id="gridCards" class="grid grid-cols-1 sm:grid-cols-2 gap-4 min-h-[300px]"></div>

    <!-- Navegação -->
    <div class="flex justify-center mt-8 gap-2">
      <button onclick="mudarPagina(-1)" class="bg-slate-900 hover:bg-slate-800 px-6 py-3 rounded-2xl text-xs font-bold transition-all">Anterior</button>
      <button onclick="mudarPagina(1)" class="bg-slate-900 hover:bg-slate-800 px-6 py-3 rounded-2xl text-xs font-bold transition-all">Próximo</button>
    </div>
  </div>

  <script>
    let todosItens = [];
    let itensFiltrados = [];
    let paginaAtual = 1;
    let itensPorPagina = 10;

    function renderizar() {
      const container = document.getElementById('gridCards');
      const inicio = (paginaAtual - 1) * itensPorPagina;
      const paginaItens = itensFiltrados.slice(inicio, inicio + itensPorPagina);

      if (itensFiltrados.length === 0) {
        container.innerHTML = `<p class="text-slate-500 text-center w-full mt-10">Nenhuma divergência encontrada.</p>`;
        return;
      }

      container.innerHTML = paginaItens.map(item => `
        <div id="card-${item.id}" class="bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-xl transition-all">
          <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-3">
              <h2 class="text-xl font-black text-emerald-400 font-mono">${item.endereco}</h2>
              <button onclick="confirmarExclusao(${item.id})" class="text-slate-600 hover:text-red-500 transition-colors">🗑️</button>
            </div>
            <span class="px-3 py-1 rounded-full text-[9px] font-bold border ${item.status_estoque === 'Faltando' ? 'text-red-400 border-red-900 bg-red-950/30' : 'text-yellow-400 border-yellow-900 bg-yellow-950/30'} uppercase">${item.status_estoque}</span>
          </div>
          <div class="grid grid-cols-2 gap-2 text-xs text-slate-400">
            <div>SKU: <span class="font-bold text-white">${item.codigo_produto}</span></div>
            <div>Lote: <span class="font-bold text-white">${item.lote}</span></div>
            <div>Qtd: <span class="font-bold text-white">${item.quantidade}</span></div>
          </div>
        </div>
      `).join('');

      document.getElementById('infoPagina').textContent = `Página ${paginaAtual} de ${Math.ceil(itensFiltrados.length / itensPorPagina) || 1} | Total: ${itensFiltrados.length}`;
    }

    function filtrarDados() {
      const busca = document.getElementById('campoBusca').value.toLowerCase();
      itensFiltrados = todosItens.filter(i => 
        i.codigo_produto.toLowerCase().includes(busca) || 
        i.lote.toLowerCase().includes(busca) || 
        i.endereco.toLowerCase().includes(busca)
      );
      paginaAtual = 1;
      renderizar();
    }

    function mudarItens() {
      itensPorPagina = parseInt(document.getElementById('itensPorPagina').value);
      paginaAtual = 1;
      renderizar();
    }

    function mudarPagina(dir) {
      const maxPag = Math.ceil(itensFiltrados.length / itensPorPagina);
      paginaAtual = Math.max(1, Math.min(paginaAtual + dir, maxPag));
      renderizar();
    }

    function confirmarExclusao(id) {
      const card = document.getElementById(`card-${id}`);
      card.innerHTML = `
        <div class="flex flex-col items-center justify-center h-full p-4 bg-red-950/20 border border-red-900/50 rounded-3xl animate-in fade-in">
          <p class="text-sm mb-4 text-center">Confirmar resolução/exclusão?</p>
          <div class="flex gap-3">
            <button onclick="renderizar()" class="px-4 py-2 bg-slate-800 rounded-xl text-xs">Cancelar</button>
            <button onclick="executarDelecao(${id})" class="px-4 py-2 bg-red-600 rounded-xl text-xs font-bold">Resolver</button>
          </div>
        </div>
      `;
    }

    async function executarDelecao(id) {
      const el = document.getElementById(`card-${id}`);
      el.classList.add('deletando');
      const user = JSON.parse(sessionStorage.getItem('usuarioLogado'));
      try {
        await fetch(`https://codril.onrender.com/api/deletar-produto.php?id=${id}&token=${user.token}`);
        todosItens = todosItens.filter(i => i.id !== id);
        itensFiltrados = itensFiltrados.filter(i => i.id !== id);
        setTimeout(renderizar, 400);
      } catch (err) { el.classList.remove('deletando'); }
    }

    function gerarRelatorio() {
      const win = window.open('', '_blank');
      win.document.write(`<html><head><title>Relatório de Divergências</title><style>body{font-family:sans-serif;} table{width:100%;border-collapse:collapse;margin-top:20px;} th{background:#e5e7eb;padding:10px;border:1px solid #ccc;text-align:center;} td{padding:8px;border:1px solid #ccc;text-align:center;} tr:nth-child(even){background:#f3f4f6;}</style></head><body><h1>Gestão de Divergências</h1><table><tr><th>Endereço</th><th>SKU</th><th>Lote</th><th>Qtd</th><th>Status</th></tr>${itensFiltrados.map(i => `<tr><td>${i.endereco}</td><td>${i.codigo_produto}</td><td>${i.lote}</td><td>${i.quantidade}</td><td>${i.status_estoque}</td></tr>`).join('')}</table></body></html>`);
      win.document.close();
      win.print();
    }

    async function carregarDados() {
      const user = JSON.parse(sessionStorage.getItem('usuarioLogado'));
      if(!user) { window.location.href = 'login.html'; return; }
      try {
        const res = await fetch(`https://codril.onrender.com/api/salvar-produto.php?token=${user.token}`);
        const data = await res.json();
        if (data.success) {
          todosItens = data.itens || [];
          itensFiltrados = todosItens;
          renderizar();
        }
      } catch (err) { console.error("Erro ao carregar:", err); }
    }

    window.onload = carregarDados;
  </script>
</body>
</html>
