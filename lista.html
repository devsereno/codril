<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULMÃO AE - Consulta de Stock</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen relative font-sans">

  <div class="max-w-4xl mx-auto p-4">
    <div class="flex justify-between items-center mb-6 border-b border-slate-900 pb-4">
      <div>
        <h1 class="text-2xl font-extrabold">Estoque Ativo</h1>
        <p id="contadorItens" class="text-slate-400 text-xs">Carregando posições...</p>
      </div>
      <a href="index.html" class="px-4 py-2 bg-slate-900 border border-slate-800 rounded-xl text-xs font-bold">⬅️ Novo</a>
    </div>

    <input id="filtro" oninput="filtrarCards()" placeholder="🔍 Pesquisar..." type="text" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-5 py-4 mb-6 text-sm">

    <div id="gridCards" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      </div>
  </div>

  <script>
    let itensEstoque = [];
    
    // Função para renderizar os cards com o novo Status
    function renderizarCards(itens) {
      const container = document.getElementById('gridCards');
      container.innerHTML = '';
      document.getElementById('contadorItens').textContent = `${itens.length} posições ativas`;

      itens.forEach(item => {
        // Lógica do Status
        const status = item.status_estoque || 'Normal';
        const statusCor = status === 'Faltando' 
          ? 'text-red-400 bg-red-950/30 border-red-900' 
          : (status === 'Sobrando' ? 'text-yellow-400 bg-yellow-950/30 border-yellow-900' : 'text-emerald-400 bg-emerald-950/30 border-emerald-900');

        const card = document.createElement('div');
        card.className = "bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-xl";
        card.innerHTML = `
          <div class="flex justify-between items-start mb-4">
            <div>
              <span class="text-[10px] text-slate-500 uppercase font-bold">Endereço</span>
              <h2 class="text-2xl font-black text-emerald-400">${item.endereco}</h2>
            </div>
            <span class="px-3 py-1 rounded-full text-[10px] font-bold border ${statusCor}">${status}</span>
          </div>
          <div class="grid grid-cols-2 gap-2 text-xs mb-3">
            <div class="bg-slate-950 p-2 rounded-lg">
              <span class="text-slate-500 block">SKU</span>
              <span class="font-bold">${item.codigo_produto}</span>
            </div>
            <div class="bg-slate-950 p-2 rounded-lg">
              <span class="text-slate-500 block">Lote</span>
              <span class="font-bold">${item.lote}</span>
            </div>
          </div>
          <div class="text-xs text-slate-400">Qtd: <span class="font-bold text-white">${item.quantidade}</span></div>
        `;
        container.appendChild(card);
      });
    }

    // Filtro de pesquisa
    function filtrarCards() {
      const query = document.getElementById('filtro').value.toLowerCase();
      const filtrados = itensEstoque.filter(item => 
        item.endereco.includes(query) || 
        item.codigo_produto.includes(query) || 
        item.lote.toLowerCase().includes(query)
      );
      renderizarCards(filtrados);
    }

    // Carregar dados
    async function carregarDados() {
      const user = JSON.parse(sessionStorage.getItem('usuarioLogado'));
      try {
        const res = await fetch(`https://codril.onrender.com/api/salvar-produto.php?token=${user.token}`);
        const data = await res.json();
        if (data.success) {
          itensEstoque = data.itens;
          renderizarCards(itensEstoque);
        }
      } catch (err) {
        console.error("Erro ao carregar");
      }
    }

    window.onload = carregarDados;
  </script>
</body>
</html>
