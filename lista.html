<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulmão AE - Lista</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div class="max-w-4xl mx-auto p-4">

    <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
      <h1 class="text-3xl font-bold">Itens Cadastrados</h1>
      <div class="flex gap-3">
        <button onclick="carregarItens()" 
                class="px-6 py-3 bg-red-600 hover:bg-red-500 rounded-2xl text-sm font-medium flex items-center gap-2 transition-all active:scale-95">
          🔄 Atualizar Lista
        </button>
        <a href="index.html" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-2xl text-sm font-medium">
          + Novo Cadastro
        </a>
      </div>
    </div>

    <input id="busca" placeholder="🔍 Buscar por lote, código ou endereço..." 
           class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-6" onkeyup="filtrarItens()">

    <div id="listaItens" class="space-y-4"></div>
  </div>

  <script>
    // Variável global para guardar os itens e permitir a busca local sem sobrecarregar a API
    let todosOsItens = [];

    async function carregarItens() {
      const container = document.getElementById('listaItens');
      container.innerHTML = `<p class="text-center py-12 text-slate-400">Carregando itens...</p>`;

      try {
        const res = await fetch('https://codril.onrender.com/api/salvar-produto.php');
        const data = await res.json();

        if (data.success && data.itens) {
          todosOsItens = data.itens; // Salva os dados recebidos
          renderizarItens(todosOsItens);
        } else {
          exibirMensagemVazia();
        }
      } catch (e) {
        console.error("Erro na requisição:", e);
        container.innerHTML = `<p class="text-red-400 text-center py-12">Erro ao carregar lista. Verifique o console.</p>`;
      }
    }

    function renderizarItens(itens) {
      const container = document.getElementById('listaItens');
      
      if (itens.length === 0) {
        exibirMensagemVazia();
        return;
      }

      let html = '';
      itens.forEach(item => {
        // Correção da sintaxe das chaves e verificação de campos nulos
        const tipo = item.tipo ? item.tipo.toUpperCase() : 'N/A';
        const dataCadastro = item.data_cadastro ? item.data_cadastro.substring(0,10) : '';
        const descricaoHtml = item.descricao ? `<p class="text-slate-400 text-sm mt-2">${item.descricao}</p>` : '';

        html += `
          <div class="item-card bg-slate-900 p-5 rounded-3xl border border-slate-700">
            <div class="flex justify-between mb-3">
              <span class="px-4 py-1 bg-blue-500/20 text-blue-400 rounded-full text-sm">${tipo}</span>
              <span class="text-xs text-slate-500">${dataCadastro}</span>
            </div>
            <p class="text-2xl font-mono">${item.endereco || 'Sem Endereço'}</p>
            <p class="text-lg">${item.codigo_produto || ''} • ${item.lote || ''}</p>
            ${descricaoHtml}
          </div>`;
      });
      container.innerHTML = html;
    }

    function exibirMensagemVazia() {
      const container = document.getElementById('listaItens');
      container.innerHTML = `
        <div class="bg-slate-900 rounded-3xl p-12 text-center border border-slate-700">
          <p class="text-6xl mb-4">📦</p>
          <p class="text-xl text-slate-300">Nenhum item encontrado</p>
        </div>`;
    }

    // Filtro inteligente que busca diretamente nos dados salvos na memória
    function filtrarItens() {
      const termo = document.getElementById('busca').value.toLowerCase();
      
      const itensFiltrados = todosOsItens.filter(item => {
        const endereco = (item.endereco || '').toLowerCase();
        const codigo = (item.codigo_produto || '').toLowerCase();
        const lote = (item.lote || '').toLowerCase();
        const descricao = (item.descricao || '').toLowerCase();

        return endereco.includes(termo) || 
               codigo.includes(termo) || 
               lote.includes(termo) || 
               descricao.includes(termo);
      });

      renderizarItens(itensFiltrados);
    }

    window.onload = carregarItens;
  </script>
</body>
</html>
