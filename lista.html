<!DOCTYPE html>
<html lang="pt-PT" class="dark"> <!-- Classe "dark" aqui ativa o modo -->
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>
<body class="bg-white dark:bg-[#020617] text-black dark:text-white transition-colors duration-300 min-h-screen p-4">

  <!-- Botão de Alternar Modo -->
  <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 bg-gray-200 dark:bg-slate-800 rounded-lg text-xs font-bold">
    Alternar Modo
  </button>

  <!-- Exemplo de como usar a classe "dark:" -->
  <div class="bg-gray-100 dark:bg-slate-900 border border-gray-200 dark:border-slate-800 p-5 rounded-3xl">
    <h2 class="text-emerald-600 dark:text-emerald-400 font-black">Conteúdo</h2>
  </div>

</body>
</html>
