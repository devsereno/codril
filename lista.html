<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque Ativo - Paginação</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4">

  <div class="max-w-4xl mx-auto">
    <!-- Cabeçalho -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-xl font-bold">Listagem de Estoque</h1>
      <button onclick="gerarRelatorio()" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold">📄 Relatório PDF</button>
    </div>

    <!-- Controles de Paginação -->
    <div class="flex gap-4 mb-4 text-sm">
      <select id="itensPorPagina" onchange="mudarItens()" class="bg-slate-900 border border-slate-800 rounded-lg p-2">
        <option value="10">10 por página</option>
        <option value="15">15 por página</option>
      </select>
    </div>

    <div id="gridCards" class="grid gap-4"></div>

    <!-- Navegação de página -->
    <div class="flex justify-center mt-6 gap-2">
      <button onclick="mudarPagina(-1)" class="bg-slate-800 px-4 py-2 rounded-lg text-sm">Anterior</button>
      <span id="infoPagina" class="py-2 px-2 text-sm">Pág 1</span>
      <button onclick="mudarPagina(1)" class="bg-slate-800 px-4 py-2 rounded-lg text-sm">Próximo</button>
    </div>
  </div>

  <script>
    let todosItens = [];
    let paginaAtual = 1;
    let itensPorPagina = 10;

    function renderizar() {
      const inicio = (paginaAtual - 1) * itensPorPagina;
      const fim = inicio + itensPorPagina;
      const paginaItens = todosItens.slice(inicio, fim);
      
      const container = document.getElementById('gridCards');
      container.innerHTML = paginaItens.map(item => `
        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
          <div>
            <p class="font-bold">${item.endereco} - ${item.codigo_produto}</p>
            <p class="text-xs text-slate-400">Lote: ${item.lote} | Qtd: ${item.quantidade}</p>
          </div>
          <span class="text-xs font-bold ${item.status_estoque === 'Faltando' ? 'text-red-400' : 'text-yellow-400'}">${item.status_estoque}</span>
        </div>
      `).join('');
      
      document.getElementById('infoPagina').textContent = `Pág ${paginaAtual}`;
    }

    function mudarItens() {
      itensPorPagina = parseInt(document.getElementById('itensPorPagina').value);
      paginaAtual = 1;
      renderizar();
    }

    function mudarPagina(dir) {
      const maxPag = Math.ceil(todosItens.length / itensPorPagina);
      paginaAtual = Math.max(1, Math.min(paginaAtual + dir, maxPag));
      renderizar();
    }

    function gerarRelatorio() {
      // Abre uma nova janela para impressão
      const win = window.open('', '_blank');
      win.document.write('<html><head><title>Relatório de Estoque</title></head><body>');
      win.document.write('<h1>Relatório de Estoque</h1><table border="1" width="100%">');
      win.document.write('<tr><th>Endereço</th><th>SKU</th><th>Lote</th><th>Status</th></tr>');
      todosItens.forEach(i => win.document.write(`<tr><td>${i.endereco}</td><td>${i.codigo_produto}</td><td>${i.lote}</td><td>${i.status_estoque}</td></tr>`));
      win.document.write('</table></body></html>');
      win.document.close();
      win.print();
    }

    // Carregamento inicial (simulado)
    async function carregarDados() {
      // Sua chamada fetch aqui...
      // todosItens = data.itens; renderizar();
    }
  </script>
</body>
</html>
