<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulmão AE - Lista de Itens</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div class="max-w-4xl mx-auto p-4">

    <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
      <div>
        <h1 class="text-3xl font-bold">Itens Cadastrados</h1>
        <p class="text-slate-400">Total de registros</p>
      </div>
      <a href="index.html" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 rounded-2xl text-sm font-medium">
        ← Novo Cadastro
      </a>
    </div>

    <!-- Busca -->
    <input id="busca" type="text" placeholder="🔍 Buscar por lote, código ou endereço..." 
           onkeyup="filtrarItens()" 
           class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-5 py-4 mb-6">

    <!-- Lista -->
    <div id="listaItens" class="space-y-3"></div>
  </div>

  <script>
    async function carregarItens(filtro = '') {
      const container = document.getElementById('listaItens');
      container.innerHTML = '<p class="text-slate-500 text-center py-10">Carregando itens...</p>';

      try {
        const res = await fetch('https://codril.onrender.com/api/salvar-produto.php');
        // Por enquanto a API não retorna lista, então mostramos mensagem
        container.innerHTML = `
          <div class="bg-slate-900 rounded-3xl p-10 text-center border border-slate-700">
            <p class="text-6xl mb-6">📦</p>
            <p class="text-xl text-slate-300">Nenhum item cadastrado ainda</p>
            <p class="text-slate-500 mt-2">Cadastre produtos na tela anterior</p>
          </div>`;
      } catch (e) {
        container.innerHTML = `<p class="text-red-400 text-center py-10">Erro ao carregar a lista</p>`;
      }
    }

    function filtrarItens() {
      carregarItens(document.getElementById('busca').value.toUpperCase());
    }

    window.onload = carregarItens;
  </script>
</body>
</html>
